name: Python Matrix

on:
    push:
        branches: [main]

jobs: 
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup python 3.13
              uses: actions/setup-python@v4
              with:
                python-version: "3.13"
                #To do linting(check the syntax), so there is a library called flake8
                #for that we create a new file called requirements.txt

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run Linter
              run: flake8 app.py
