name: Python Matrix

on:
   workflow_call:

jobs: 
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}
                #To do linting(check the syntax), so there is a library called flake8
                #for that we create a new file called requirements.txt

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run Linter
              run: flake8 app.py
