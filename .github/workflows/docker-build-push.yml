name: Docker Build & Push

on:
    push:
        branches: [main]

jobs:
    Build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Code Checkout 
              uses: actions/checkout@v4

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with: 
                #Always keep username and password in secrets & variables
                #secrets: Passwords, Tokens, etc
                #variables: username etc.
                username: ${{ vars.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build & Push to DockerHub
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: | #use pipe for multiple lines usage
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.ref }}
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:latest
                    ${{ vars.DOCKERHUB_USER }}/github-actions-app:${{ github.sha }}

