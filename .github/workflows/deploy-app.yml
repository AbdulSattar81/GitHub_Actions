name: Deploy Flask App

on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:

jobs:
    deploy:
      if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
      env:
            DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
            DOCKER_TAG: latest

      runs-on: self-hosted

      steps: 
          - name: checkout code
            uses: actions/checkout@v4

          - name: Set up Docker compose (optional, usually pre-installed on ubuntu-latest)
            uses: docker/setup-compose-action@v2

          - name: deploy with docker compose
            run: docker compose down && docker compose pull && docker compose up -d --force-recreate
            
