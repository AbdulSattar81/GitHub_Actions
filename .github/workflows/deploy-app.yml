name: Deploy Flask App

# on:
#     workflow_run:
#       workflows: ["Docker Build & Push"] #Name of the upstream workflow
#       types: [completed]
#       branches:
#         - main

on:
  workflow_dispatch:

jobs:
    deploy:
      env:
            DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}

      runs-on: self-hosted

      steps: 
          - name: checkout code
            uses: actions/checkout@v4

          - name: Set up Docker compose (optional, usually pre-installed on ubuntu-latest)
            uses: docker/setup-compose-action@v2

          - name: deploy with docker compose
            run: docker compose down && docker compose up -d --build --force-recreate --pull always
            